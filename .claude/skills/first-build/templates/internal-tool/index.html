<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My tracker</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1 id="page-title">…</h1>
    <p id="page-tagline" class="tagline"></p>
  </header>

  <main>
    <form id="entry-form" class="card" novalidate></form>
    <section class="card">
      <table id="entries-table">
        <thead></thead>
        <tbody></tbody>
      </table>
      <p id="empty-state" class="empty"></p>
    </section>
  </main>

  <footer>
    <p>Built in ~30 min with <a href="https://github.com/HT224/first-build">/first-build</a>.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
